<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BWMessenger — Современный мессенджер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-page: #e8eaed;
            --bg-sidebar: #ffffff;
            --bg-chat: #f5f7fb;
            --bg-header: #ffffff;
            --bg-message-own: #d3e3fd;
            --bg-message-other: #ffffff;
            --text-primary: #1f2d3d;
            --text-secondary: #5c6f87;
            --border-light: #e9ecef;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --online-green: #22c55e;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --danger: #ef4444;
            --warning: #f59e0b;
            --read-blue: #3390ec;
        }

        body.dark {
            --bg-page: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-chat: #0f172a;
            --bg-header: #1e293b;
            --bg-message-own: #2d3a5e;
            --bg-message-other: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-light: #334155;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --read-blue: #4a9eff;
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        @keyframes ring {
            0% { transform: rotate(0); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
            75% { transform: rotate(5deg); }
            100% { transform: rotate(0); }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-container {
            background: var(--bg-sidebar);
            border-radius: 28px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeIn 0.2s ease;
            box-shadow: var(--shadow-md);
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-sidebar);
            z-index: 10;
        }
        .modal-header h3 { font-size: 20px; font-weight: 600; }
        .modal-body { padding: 24px; }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: 0.2s;
        }
        .close-modal:hover { color: var(--text-primary); }

        .context-menu {
            position: fixed;
            background: var(--bg-sidebar);
            border-radius: 16px;
            padding: 8px 0;
            z-index: 4000;
            box-shadow: var(--shadow-md);
            min-width: 220px;
            border: 1px solid var(--border-light);
            animation: fadeIn 0.1s ease;
        }
        .context-menu-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.15s;
            font-size: 14px;
        }
        .context-menu-item i { width: 20px; color: var(--text-secondary); }
        .context-menu-item:hover { background: var(--bg-chat); }
        .context-menu-divider {
            height: 1px;
            background: var(--border-light);
            margin: 6px 0;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: var(--bg-sidebar);
            z-index: 3500;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }
        .drawer.open { left: 0; }
        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .drawer-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
        }
        .drawer-user-info h4 { font-size: 16px; font-weight: 600; }
        .drawer-user-info p { font-size: 13px; color: var(--text-secondary); }
        .drawer-item {
            padding: 14px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.15s;
            font-size: 15px;
        }
        .drawer-item i { width: 24px; color: var(--text-secondary); }
        .drawer-item:hover { background: var(--bg-chat); }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3400;
        }
        .overlay.show { display: block; }

        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-page) 0%, var(--bg-chat) 100%);
        }
        .auth-card {
            background: var(--bg-sidebar);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
            animation: fadeIn 0.3s ease;
        }
        .auth-card h2 {
            font-size: 28px;
            margin-bottom: 28px;
            text-align: center;
            color: var(--accent);
        }
        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border-light);
            background: var(--bg-chat);
            color: var(--text-primary);
            font-size: 15px;
            transition: 0.2s;
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .auth-card button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-card button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .auth-link {
            text-align: center;
            margin-top: 12px;
        }
        .auth-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 16px;
            display: block;
            border: 3px solid var(--accent);
            cursor: pointer;
        }
        .error-text {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: -8px;
            margin-bottom: 12px;
        }

        .messenger-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .sidebar-panel {
            width: 360px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .user-avatar-small {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }
        .search-container {
            padding: 12px 16px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background: var(--bg-chat);
            color: var(--text-primary);
            font-size: 14px;
        }
        .search-results {
            position: absolute;
            top: 70px;
            left: 16px;
            right: 16px;
            background: var(--bg-sidebar);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            z-index: 100;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-light);
        }
        .search-result-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.15s;
        }
        .search-result-item:hover { background: var(--bg-chat); }
        
        .chats-scroll {
            flex: 1;
            overflow-y: auto;
        }
        .chat-row {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid var(--border-light);
        }
        .chat-row:hover { background: var(--bg-chat); }
        .chat-row.active { background: var(--bg-chat); }
        .chat-avatar-wrapper {
            position: relative;
        }
        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: white;
        }
        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: var(--online-green);
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chat-preview {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .archive-header {
            padding: 8px 20px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .archive-header:hover { background: var(--bg-chat); }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
        }
        .chat-header-area {
            padding: 16px 24px;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message-own {
            align-self: flex-end;
            background: var(--bg-message-own);
            border-bottom-right-radius: 4px;
        }
        .message-other {
            align-self: flex-start;
            background: var(--bg-message-other);
            border-bottom-left-radius: 4px;
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        .message-meta {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .message-status {
            font-size: 12px;
        }
        .message-status.sent { color: var(--text-secondary); }
        .message-status.delivered { color: var(--text-secondary); }
        .message-status.read { color: var(--read-blue); }

        .input-area {
            padding: 16px 20px;
            background: var(--bg-header);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .message-input-field {
            flex: 1;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            background: var(--bg-chat);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .send-button:hover { background: var(--accent-hover); transform: scale(1.02); }
        .attach-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-chat);
            border: 1px solid var(--border-light);
            cursor: pointer;
            color: var(--text-secondary);
        }
        .voice-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-chat);
            border: 1px solid var(--border-light);
            cursor: pointer;
            color: var(--text-secondary);
        }
        .voice-button.recording {
            background: var(--danger);
            color: white;
            animation: pulse 1s infinite;
        }
        .call-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            color: white;
        }
        .no-chat-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            flex-direction: column;
            gap: 12px;
        }
        .notification-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-sidebar);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            white-space: nowrap;
        }
        .incoming-call {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            padding: 16px 24px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            z-index: 2500;
            animation: slideIn 0.3s ease;
        }

        .group-user-select {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
        }
        .group-user-select-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .group-user-select-checkbox.selected { background: var(--accent); color: white; }
        .group-user-select-checkbox.selected::after { content: '✓'; font-size: 12px; }

        @media (max-width: 768px) {
            .sidebar-panel { width: 100%; position: absolute; z-index: 10; transform: translateX(-100%); transition: 0.2s; }
            .sidebar-panel.mobile-open { transform: translateX(0); }
            .message-bubble { max-width: 85%; }
        }

        .profile-header-card { text-align: center; margin-bottom: 24px; }
        .profile-avatar-large { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 3px solid var(--accent); }
        .profile-name-large { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .profile-username-large { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; }
        .profile-id { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .profile-email { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
        .profile-info-row { display: flex; padding: 14px 0; border-bottom: 1px solid var(--border-light); }
        .profile-info-label { width: 100px; color: var(--text-secondary); font-weight: 500; }
        .profile-info-value { flex: 1; color: var(--text-primary); }
        .profile-edit-btn { margin-top: 20px; width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; }

        .settings-group { margin-bottom: 24px; }
        .settings-group-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; text-transform: uppercase; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-light); }
        .settings-row-left { display: flex; align-items: center; gap: 12px; }
        .settings-row-left i { width: 24px; color: var(--text-secondary); }
        .settings-switch { width: 44px; height: 24px; background: var(--border-light); border-radius: 24px; position: relative; cursor: pointer; transition: 0.2s; }
        .settings-switch.active { background: var(--accent); }
        .settings-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
        .settings-switch.active::after { left: 22px; }
        .settings-select { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-light); background: var(--bg-chat); color: var(--text-primary); }
    </style>
</head>
<body>
<div id="root"></div>

<script>
    emailjs.init("ozNh-mba3XbBgyuIw");

    const DB_NAME = 'BWMessengerDB';
    const DB_VERSION = 17;
    let db = null;
    let currentUser = null;
    let currentChat = null;
    let allChats = [];
    let showArchived = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let activeCall = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => { db = request.result; resolve(db); };
            request.onupgradeneeded = (e) => {
                const db_ = e.target.result;
                if (!db_.objectStoreNames.contains('users')) {
                    const userStore = db_.createObjectStore('users', { keyPath: 'id' });
                    userStore.createIndex('username', 'username', { unique: true });
                    userStore.createIndex('email', 'email', { unique: true });
                }
                if (!db_.objectStoreNames.contains('chats')) db_.createObjectStore('chats', { keyPath: 'id' });
                if (!db_.objectStoreNames.contains('messages')) {
                    const msgStore = db_.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                    msgStore.createIndex('chatId', 'chatId');
                    msgStore.createIndex('timestamp', 'timestamp');
                }
                if (!db_.objectStoreNames.contains('session')) db_.createObjectStore('session', { keyPath: 'id' });
                if (!db_.objectStoreNames.contains('temp_codes')) db_.createObjectStore('temp_codes', { keyPath: 'email' });
            };
        });
    }

    async function getUsers() { 
        return new Promise((resolve) => { 
            const tx = db.transaction('users', 'readonly'); 
            tx.objectStore('users').getAll().onsuccess = e => resolve(e.target.result); 
        }); 
    }
    async function saveUser(user) { 
        const tx = db.transaction('users', 'readwrite'); 
        tx.objectStore('users').put(user); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function getUserByEmail(email) { 
        return new Promise((resolve) => { 
            const tx = db.transaction('users', 'readonly'); 
            tx.objectStore('users').index('email').get(email).onsuccess = e => resolve(e.target.result); 
        }); 
    }
    async function getUserByUsername(username) { 
        return new Promise((resolve) => { 
            const tx = db.transaction('users', 'readonly'); 
            tx.objectStore('users').index('username').get(username).onsuccess = e => resolve(e.target.result); 
        }); 
    }
    async function getAllChats() { 
        return new Promise((resolve) => { 
            const tx = db.transaction('chats', 'readonly'); 
            tx.objectStore('chats').getAll().onsuccess = e => resolve(e.target.result); 
        }); 
    }
    async function saveChat(chat) { 
        const tx = db.transaction('chats', 'readwrite'); 
        tx.objectStore('chats').put(chat); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function getMessages(chatId) { 
        return new Promise((resolve) => { 
            const tx = db.transaction('messages', 'readonly'); 
            tx.objectStore('messages').index('chatId').getAll(chatId).onsuccess = e => resolve(e.target.result.sort((a,b) => a.timestamp - b.timestamp)); 
        }); 
    }
    async function saveMessage(msg) { 
        const tx = db.transaction('messages', 'readwrite'); 
        tx.objectStore('messages').add(msg); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function updateMessageStatus(msgId, status) { 
        const tx = db.transaction('messages', 'readwrite'); 
        const store = tx.objectStore('messages'); 
        const req = store.get(msgId); 
        req.onsuccess = () => { if(req.result) { req.result.status = status; store.put(req.result); } }; 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function updateMessageText(msgId, newText) { 
        const tx = db.transaction('messages', 'readwrite'); 
        const store = tx.objectStore('messages'); 
        const req = store.get(msgId); 
        req.onsuccess = () => { if(req.result) { req.result.text = newText; req.result.edited = true; store.put(req.result); } }; 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function deleteMessageById(msgId) { 
        const tx = db.transaction('messages', 'readwrite'); 
        tx.objectStore('messages').delete(msgId); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function getSession() { 
        return new Promise((resolve) => { 
            const tx = db.transaction('session', 'readonly'); 
            tx.objectStore('session').get('current').onsuccess = e => resolve(e.target.result?.userId || null); 
        }); 
    }
    async function setSession(userId) { 
        const tx = db.transaction('session', 'readwrite'); 
        tx.objectStore('session').put({ id: 'current', userId }); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function clearSession() { 
        const tx = db.transaction('session', 'readwrite'); 
        tx.objectStore('session').delete('current'); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function saveTempCode(email, code, data) { 
        const tx = db.transaction('temp_codes', 'readwrite'); 
        tx.objectStore('temp_codes').put({ email, code, data, expires: Date.now() + 600000 }); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }
    async function getTempCode(email) { 
        return new Promise((resolve) => { 
            const tx = db.transaction('temp_codes', 'readonly'); 
            tx.objectStore('temp_codes').get(email).onsuccess = e => resolve(e.target.result); 
        }); 
    }
    async function deleteTempCode(email) { 
        const tx = db.transaction('temp_codes', 'readwrite'); 
        tx.objectStore('temp_codes').delete(email); 
        return new Promise(r => { tx.oncomplete = r; }); 
    }

        if (status === 'delivered') return '<i class="fas fa-check-double message-status delivered"></i>';
        if (status === 'read') return '<i class="fas fa-check-double message-status read"></i>';

        if (!chat) return;
        let targetName = '';
        if (chat.type === 'private') {
            const otherId = chat.participants.find(id => id !== currentUser.id);
            const users = await getUsers();
            const other = users.find(u => u.id === otherId);
            targetName = other ? `${other.name}` : 'собеседником';
        } else {
            targetName = chat.name;
        }
        showToast(`📞 Вызов ${targetName}... (демо-режим)`);
        setTimeout(() => {

        }, 5000);

            if (user && user.id !== currentUser.id) {

    async function renderChatsList() {
        const container = document.getElementById('chatsListContainer');
        if(!container) return;
        const users = await getUsers();
        const myId = currentUser.id;
        let myChats = allChats.filter(c => {
            if (c.archived && !showArchived) return false;
            if (c.type === 'private') return c.participants?.includes(myId);
            if (c.type === 'saved') return c.userId === myId;
            if (c.type === 'group') return c.participants?.includes(myId);
            return false;
        });
        
        container.innerHTML = myChats.map(chat => {
            let displayName = chat.name;
            let avatarHtml = '';
            let isOnline = false;
            if(chat.type === 'private') {
                const otherId = chat.participants.find(id => id !== myId);
                const other = users.find(u => u.id === otherId);
                displayName = other ? `${other.name} ${other.lastname || ''}` : 'Unknown';
                isOnline = other?.online || false;
                const canSeeAvatar = !other?.privacy?.photo || other.privacy.photo === 'all' || (other.privacy.photo === 'contacts' && true);
                if (other?.avatar && canSeeAvatar) {
                    avatarHtml = `<img class="chat-avatar" src="${other.avatar}">`;
                } else {
                    avatarHtml = `<div class="chat-avatar">${displayName.charAt(0).toUpperCase()}</div>`;
                }
            } else if(chat.type === 'saved') { displayName = '⭐ Избранное'; avatarHtml = '<div class="chat-avatar">⭐</div>'; }
            else { avatarHtml = `<div class="chat-avatar">${chat.name.charAt(0).toUpperCase()}</div>`; }
            return `<div class="chat-row ${chat.archived ? 'archived' : ''}" data-chat-id="${chat.id}" data-chat-type="${chat.type}">

                                showToast('Чат удалён');

                        if (item.dataset.action === 'pin') showToast('Закрепление в разработке');
                        if (item.dataset.action === 'unread') showToast('Помечено непрочитанным');
                        if (item.dataset.action === 'notifications') showToast('Уведомления отключены');

    async function openChat(chatId) {
        currentChat = allChats.find(c => c.id === chatId);
        if(!currentChat) return;
        document.getElementById('inputArea').style.display = 'flex';
        await markMessagesAsRead(chatId);
        await updateDeliveryStatus(chatId);
        const users = await getUsers();
        let headerText = '', headerAvatar = '';
        let otherUser = null;
        if(currentChat.type === 'private') {
            const otherId = currentChat.participants.find(id => id !== currentUser.id);
            otherUser = users.find(u => u.id === otherId);
            headerText = otherUser ? `${otherUser.name} ${otherUser.lastname || ''}` : 'Чат';
            const canSeeAvatar = !otherUser?.privacy?.photo || otherUser.privacy.photo === 'all' || (otherUser.privacy.photo === 'contacts' && true);
            if (otherUser?.avatar && canSeeAvatar) {
                headerAvatar = `<img class="chat-avatar" style="width:44px;height:44px;" src="${otherUser.avatar}">`;
            } else {
                headerAvatar = `<div class="chat-avatar" style="width:44px;height:44px;">${headerText.charAt(0).toUpperCase()}</div>`;
            }
        } else if(currentChat.type === 'saved') { headerText = '⭐ Избранное'; headerAvatar = '<div class="chat-avatar" style="width:44px;height:44px;">⭐</div>'; }
        else { headerText = currentChat.name; headerAvatar = `<div class="chat-avatar" style="width:44px;height:44px;">${headerText.charAt(0).toUpperCase()}</div>`; }
        
        document.getElementById('chatHeaderArea').innerHTML = `<i class="fas fa-bars" id="mobileMenuToggle2" style="display:${window.innerWidth<=768?'block':'none'};font-size:24px;cursor:pointer;"></i>${headerAvatar}<div><strong>${escapeHtml(headerText)}</strong><br><span style="font-size:12px;color:var(--text-secondary)">в сети</span></div>
            <div style="margin-left:auto;display:flex;gap:8px;">
                <button class="call-button" id="audioCallBtn"><i class="fas fa-phone"></i></button>
                <button class="call-button" id="videoCallBtn"><i class="fas fa-video"></i></button>
            </div>`;
        if(window.innerWidth<=768) document.getElementById('mobileMenuToggle2').onclick = () => document.getElementById('sidebarPanel').classList.toggle('mobile-open');
        document.getElementById('audioCallBtn').onclick = () => startCall(currentChat.id, false);
        document.getElementById('videoCallBtn').onclick = () => startCall(currentChat.id, true);
        await loadMessages();
        document.querySelectorAll('.chat-row').forEach(el => el.classList.remove('active'));
        const activeEl = document.querySelector(`.chat-row[data-chat-id="${chatId}"]`);
        if(activeEl) activeEl.classList.add('active');
    }

    async function loadMessages() {
        if(!currentChat) return;
        const messages = await getMessages(currentChat.id);
        const users = await getUsers();
        const container = document.getElementById('messagesArea');
        if(!messages.length) { container.innerHTML = '<div class="no-chat-placeholder"><i class="fas fa-comment-dots" style="font-size:48px;opacity:0.3;"></i><p>Нет сообщений. Напишите первым!</p></div>'; return; }
        container.innerHTML = messages.map(msg => {
            const isOwn = msg.senderId === currentUser.id;
            const sender = users.find(u => u.id === msg.senderId);
            const senderName = sender ? `${sender.name}` : 'Unknown';
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            return `<div class="message-bubble ${isOwn ? 'message-own' : 'message-other'}" data-msg-id="${msg.id}" data-msg-text="${escapeHtml(msg.text)}" data-msg-sender="${msg.senderId}">
                        <div class="message-text">${escapeHtml(msg.text)}${msg.edited ? ' <i class="fas fa-pen" style="font-size:9px;"></i>' : ''}${msg.file ? (msg.type === 'voice' ? '<i class="fas fa-microphone"></i> Голосовое сообщение' : `<a href="${msg.file}" download style="color:var(--accent);"><i class="fas fa-download"></i> ${msg.text}</a>`) : ''}</div>
                        <div class="message-meta">${!isOwn ? senderName + ' • ' : ''}${time} ${isOwn ? getMessageStatusIcon(msg.status || 'sent') : ''}</div>
                    </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('.message-bubble').forEach(el => {
            el.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const msgId = parseInt(el.dataset.msgId);
                const msgText = el.dataset.msgText;
                const isOwnMsg = el.dataset.msgSender === currentUser.id;
                let x = e.clientX, y = e.clientY;
                if (x + 230 > window.innerWidth) x = window.innerWidth - 240;
                if (y + 320 > window.innerHeight) y = window.innerHeight - 340;
                showContextMenu(x, y, msgId, msgText, isOwnMsg);
            });
        });
    }

    async function handleSendMessage() {
        const input = document.getElementById('messageInput');
        if(input && input.value.trim() && currentChat) {
            if(input.value.trim() === '/my_id') { showToast(`Ваш ID: ${currentUser.id}`); input.value = ''; return; }
            await saveMessage({ chatId: currentChat.id, senderId: currentUser.id, text: input.value, timestamp: Date.now(), status: 'sent' });
            input.value = '';
            await loadMessages();
            setTimeout(async () => {
                await updateDeliveryStatus(currentChat.id);
                await loadMessages();
            }, 2000);
        }
    }

    function showContextMenu(x, y, msgId, msgText, isOwn) {
        const existing = document.querySelector('.context-menu');
        if(existing) existing.remove();
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
        if(isOwn) {
            menu.innerHTML = `<div class="context-menu-item" data-action="edit"><i class="fas fa-pen"></i> Редактировать</div>
                              <div class="context-menu-item" data-action="copy"><i class="fas fa-copy"></i> Копировать текст</div>
                              <div class="context-menu-divider"></div>
                              <div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> Ответить</div>
                              <div class="context-menu-item" data-action="forward"><i class="fas fa-share"></i> Переслать</div>
                              <div class="context-menu-divider"></div>
                              <div class="context-menu-item" data-action="delete"><i class="fas fa-trash"></i> Удалить</div>
                              <div class="context-menu-item" data-action="select"><i class="fas fa-check-circle"></i> Выделить</div>`;
        } else {
            menu.innerHTML = `<div class="context-menu-item" data-action="reply"><i class="fas fa-reply"></i> Ответить</div>
                              <div class="context-menu-item" data-action="copy"><i class="fas fa-copy"></i> Копировать текст</div>
                              <div class="context-menu-item" data-action="forward"><i class="fas fa-share"></i> Переслать</div>
                              <div class="context-menu-divider"></div>
                              <div class="context-menu-item" data-action="select"><i class="fas fa-check-circle"></i> Выделить</div>
                              <div class="context-menu-item" data-action="report"><i class="fas fa-flag"></i> Пожаловаться</div>`;
        }
        document.body.appendChild(menu);
        menu.querySelectorAll('.context-menu-item').forEach(item => {
            item.onclick = async () => {
                const action = item.dataset.action;
                if(action === 'edit') { const newText = prompt('Новый текст:', msgText); if(newText && newText !== msgText) { await updateMessageText(msgId, newText); await loadMessages(); showToast('Сообщение отредактировано'); } }
                if(action === 'copy') { await navigator.clipboard.writeText(msgText); showToast('Текст скопирован'); }
                if(action === 'delete') { if(confirm('Удалить сообщение?')) { await deleteMessageById(msgId); await loadMessages(); showToast('Сообщение удалено'); } }
                if(action === 'reply') showToast('Функция ответа в разработке');
                if(action === 'forward') {
                    const targetUsername = prompt('Введите username получателя:');
                    if(targetUsername) {
                        const targetUser = await getUserByUsername(targetUsername);
                        if(targetUser) {
                            let chat = allChats.find(c => c.type === 'private' && c.participants?.includes(currentUser.id) && c.participants?.includes(targetUser.id));
                            if(!chat) {
                                chat = { id: `private_${Date.now()}`, type: 'private', participants: [currentUser.id, targetUser.id], name: `${targetUser.name} ${targetUser.lastname || ''}` };
                                await saveChat(chat);
                                allChats.push(chat);
                                await renderChatsList();
                            }
                            await saveMessage({ chatId: chat.id, senderId: currentUser.id, text: msgText, timestamp: Date.now(), status: 'sent' });
                            showToast('Сообщение переслано');
                        } else showToast('Пользователь не найден', true);
                    }
                }
                if(action === 'select') showToast('Сообщение выделено');
                if(action === 'report') showToast('Жалоба отправлена администратору');
                menu.remove();
            };
        });
        setTimeout(() => { if(menu.parentNode) menu.remove(); }, 5000);
    }

Все</option><option value="contacts" ${currentUser.privacy?.messages === 'contacts' ? 'selected' : ''}>Мои контакты</option></select></div></div><div class="settings-group"><div class="settings-group-title">Заблокированные пользователи</div><div class="settings-row" id="blockedUsersList"><div class="settings-row-left"><i class="fas fa-ban"></i> Заблокированные</div><span>${currentUser.blocked?.length || 0} пользователей</span></div><div class="settings-row"><div class="settings-row-left"><i class="fas fa-plus"></i> Добавить пользователя</div><input type="text" id="blockUsername" placeholder="@username" style="width:120px;padding:6px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-chat);"><button id="blockUserBtn" style="padding:6px 12px;background:var(--danger);color:white;border:none;border-radius:8px;">Заблокировать</button></div></div><button id="savePrivacyBtn" style="margin-top:20px;width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:12px;">Сохранить настройки</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById('blockUserBtn').onclick = async () => { const username = document.getElementById('blockUsername').value.trim().replace('@', ''); if(username) { const user = await getUserByUsername(username); if(user && user.id !== currentUser.id) { if(!currentUser.blocked) currentUser.blocked = []; if(!currentUser.blocked.includes(user.id)) { currentUser.blocked.push(user.id); await saveUser(currentUser); showToast(`Пользователь @${username} заблокирован`); document.getElementById('blockUsername').value = ''; } else { showToast('Пользователь уже в чёрном списке', true); } } else { showToast('Пользователь не найден', true); } } };
        document.getElementById('savePrivacyBtn').onclick = async () => {
            if (!currentUser.privacy) currentUser.privacy = {};
            currentUser.privacy.email = document.getElementById('privacyEmail').value;
            currentUser.privacy.photo = document.getElementById('privacyPhoto').value;
            currentUser.privacy.about = document.getElementById('privacyAbout').value;
            currentUser.privacy.messages = document.getElementById('privacyMessages').value;
            await saveUser(currentUser);
            showToast('Настройки конфиденциальности сохранены');
            modal.remove();
            renderMessenger();
        };
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }

    async function showSessionsModal() {
        const sessions = [{ device: 'Это устройство', location: 'Текущий сеанс', current: true, lastActive: 'Сейчас' }, { device: 'Chrome на Windows', location: 'Москва, Россия', current: false, lastActive: '2 часа назад' }];
        const modal = document.createElement('div');
        modal.className = 'modal-overlay active';
        modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3>Активные сеансы</h3><button class="close-modal">&times;</button></div><div class="modal-body">${sessions.map(s => `<div class="settings-row" style="${s.current ? 'background:var(--bg-chat);border-radius:12px;margin-bottom:8px;' : ''}"><div class="settings-row-left"><i class="fas fa-${s.current ? 'desktop' : 'laptop'}"></i><div><strong>${escapeHtml(s.device)}</strong><br><small>${escapeHtml(s.location)} • ${escapeHtml(s.lastActive)}</small></div></div>${!s.current ? '<button class="terminate-session" style="padding:4px 12px;background:var(--danger);color:white;border:none;border-radius:8px;cursor:pointer;">Завершить</button>' : '<span style="color:var(--online-green);">● Активен</span>'}</div>`).join('')}<button id="terminateAllBtn" style="margin-top:20px;width:100%;padding:12px;background:var(--warning);color:white;border:none;border-radius:12px;">Завершить все другие сеансы</button></div></div>`;
        document.body.appendChild(modal);
        document.querySelectorAll('.terminate-session').forEach(btn => { btn.onclick = () => { showToast('Сеанс завершён'); btn.closest('.settings-row')?.remove(); }; });
        document.getElementById('terminateAllBtn').onclick = () => showToast('Все другие сеансы завершены');
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }

    async function showContactsModal() {
        const users = await getUsers();
        const contacts = users.filter(u => u.id !== currentUser.id);
        const modal = document.createElement('div');
        modal.className = 'modal-overlay active';
        modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3>Контакты</h3><button class="close-modal">&times;</button></div><div class="modal-body">${contacts.map(u => `<div class="settings-row" data-username="${u.username}" style="cursor:pointer;"><div class="settings-row-left"><img src="${u.avatar || `https://ui-avatars.com/api/?background=4f46e5&color=fff&name=${u.name}`}" style="width:40px;height:40px;border-radius:50%;"><div><strong>${escapeHtml(u.name)} ${escapeHtml(u.lastname || '')}</strong><br><small>@${escapeHtml(u.username)}</small></div></div><i class="fas fa-comment" style="color:var(--accent);"></i></div>`).join('')}</div></div>`;
        document.body.appendChild(modal);
        modal.querySelectorAll('.settings-row').forEach(el => { el.onclick = async () => { const target = await getUserByUsername(el.dataset.username); if(target) { let chat = allChats.find(c => c.type === 'private' && c.participants?.includes(currentUser.id) && c.participants?.includes(target.id)); if(!chat) { chat = { id: `private_${Date.now()}`, type: 'private', participants: [currentUser.id, target.id], name: `${target.name} ${target.lastname || ''}` }; await saveChat(chat); allChats.push(chat); await renderChatsList(); } await openChat(chat.id); modal.remove(); } }; });
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }

    async function showCallsModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay active';
        modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3>Звонки</h3><button class="close-modal">&times;</button></div><div class="modal-body"><div class="no-chat-placeholder"><i class="fas fa-phone-slash" style="font-size:48px;opacity:0.3;"></i><p>История звонков пуста</p><p style="font-size:12px;">Нажмите на иконку телефона в чате, чтобы совершить звонок</p></div></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

    init();
</script>
</body>
</html>
